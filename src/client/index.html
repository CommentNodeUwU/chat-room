<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat room</title>
</head>

<body>
    <div class="container">
        <div class="content-box">
            <div class="content-title">
                <button class="nav-button" id="sidebar-button">
                    <svg viewBox="0 0 24 24">
                        <polygon fill="currentcolor" points="22 11 23 11 23 13 22 13 22 14 2 14 2 13 1 13 1 11 2 11 2 10 22 10 22 11" />
                        <polygon fill="currentcolor" points="22 19 23 19 23 21 22 21 22 22 2 22 2 21 1 21 1 19 2 19 2 18 22 18 22 19" />
                        <polygon fill="currentcolor" points="23 3 23 5 22 5 22 6 2 6 2 5 1 5 1 3 2 3 2 2 22 2 22 3 23 3" />
                    </svg>
                </button>
                <div class="site-title text-ellipsis">Chat room</div>
                <button id="user-button">
                    <div id="user-name"></div>
                    <div id="user-addr"></div>
                </button>
            </div>
            <div class="content-main">
                <div id="sidebar" class="content-left">
                    <div class="channel-box">
                        <input class="input-unstyled" id="channel-input">
                    </div>
                    <div class="user-list" id="user-list">
                        <!--
                        <div class="user-item">Name</div>
                        -->
                    </div>
                </div>
                <div id="content" class="content-right">
                    <div class="chat-log" id="chat-list">
                        <!--
                        <div class="chat-system">System message</div>
                        <div class="chat-message">
                            <div class="chat-message-time">127.0.0.1 - 1/1 8:00</div>
                            <div class="chat-message-name">Name</div>
                            <div class="chat-message-message">Message</div>
                        </div>
                        -->
                    </div>
                    <div class="chat-box">
                        <button class="chat-button" id="emoji-button">
                            <svg viewBox="0 0 24 24">
                                <polygon fill="currentcolor" points="11 20 10 20 10 22 9 22 9 23 5 23 5 22 4 22 4 16 5 16 5 15 6 15 6 18 8 18 8 17 10 17 10 16 12 16 12 15 14 15 14 17 13 17 13 18 11 18 11 20" />
                                <path fill="currentcolor" d="m22,9v-2h-1v-2h-1v-1h-1v-1h-2v-1h-2v-1h-6v1h-2v1h-2v1h-1v1h-1v2h-1v2h-1v6h1v1h1v-1h1v-1h3v2h2v-1h2v-1h-1v-1h-2v-1h3v1h2v1h2v4h-1v1h-2v2h-1v2h4v-1h2v-1h2v-1h1v-1h1v-2h1v-2h1v-6h-1Zm-7-2h3v1h1v2h-1v-1h-1v-1h-2v-1Zm-1,2h2v2h-2v-2Zm-4,1h-2v-2h2v2Zm1-2v-1h-1v-1h-2v1h-2v-1h1v-1h4v1h1v1h1v1h-2Z" />
                            </svg>
                        </button>
                        <textarea role="textbox" autocomplete="off" enterkeyhint="send" id="chat-input" class="input-unstyled chat-input"></textarea>
                        <button class="chat-button" id="file-button">
                            <input type="file" accept="*" id="file-input">
                            <svg id="Link" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <polygon fill="currentcolor" points="16 10 17 10 17 17 16 17 16 18 15 18 15 19 14 19 14 20 13 20 13 21 12 21 12 22 11 22 11 23 5 23 5 22 4 22 4 21 3 21 3 20 2 20 2 19 1 19 1 14 2 14 2 13 3 13 3 12 4 12 4 11 5 11 5 15 4 15 4 18 5 18 5 19 6 19 6 20 9 20 9 19 10 19 10 18 11 18 11 17 12 17 12 16 13 16 13 15 14 15 14 12 13 12 13 11 12 11 12 10 13 10 13 9 14 9 14 8 15 8 15 9 16 9 16 10"/>
                                <polygon fill="currentcolor" points="23 5 23 10 22 10 22 11 21 11 21 12 20 12 20 13 19 13 19 9 20 9 20 6 19 6 19 5 18 5 18 4 15 4 15 5 14 5 14 6 13 6 13 7 12 7 12 8 11 8 11 9 10 9 10 12 11 12 11 13 12 13 12 14 11 14 11 15 10 15 10 16 9 16 9 15 8 15 8 14 7 14 7 7 8 7 8 6 9 6 9 5 10 5 10 4 11 4 11 3 12 3 12 2 13 2 13 1 19 1 19 2 20 2 20 3 21 3 21 4 22 4 22 5 23 5"/>
                            </svg>
                        </button>
                        <button style="width: 60px; justify-content: center;" class="chat-button" id="send-button">
                            <svg viewBox="0 0 24 24">
                                <path fill="currentcolor" d="m1 1.5 4 0V2.5H7v1h2v1h2v1h2v1h2V7.5H17v1h2v1h2V10.5l2 0v2l-2 0v1h-2v1H17v1h-2v1h-2v1h-2v1H9v1H7v1H5v1H1v-2h1v-2h1v-2h1v-2h1v-1h7v-2H5V9.5H4V7.5H3V5.5h-1V3.5H1Z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <dialog class="dialog-box" id="connect-dialog">
        <div class="dialog-content center">Connecting...</div>
    </dialog>

    <dialog class="dialog-box" id="info-dialog">
        <div class="dialog-content" id="info-message"></div>
        <div class="dialog-footer">
            <button id="info-ok">OK</button>
        </div>
    </dialog>

    <dialog class="dialog-box" id="name-dialog">
        <div class="dialog-content">
            <label for="name-input">Nickname</label>
            <input class="input-unstyled input-bordered" id="name-input">
        </div>
        <div class="dialog-content">
            <label for="token-input">Token</label>
            <input class="input-unstyled input-bordered" spellcheck="false" id="token-input">
        </div>
        <div class="dialog-footer">
            <button id="name-cancel">Cancel</button>
            <button id="name-ok">OK</button>
        </div>
    </dialog>

    <dialog class="dialog-box" id="user-info-dialog">
        <div class="dialog-content">
            <div id="user-info-name">Example user</div>
            <div id="user-info-addr">127.0.*.*</div>
        </div>
        <div class="dialog-footer">
            <button id="user-info-ok">OK</button>
        </div>
    </dialog>

    <dialog id="image-view-dialog" style="border: none; background-color: rgba(0, 0, 0, 0);">
        <img class="image-preview" id="image-view-image" src="">
    </dialog>

    <dialog class="dialog-box" id="image-paste-dialog">
        <div class="dialog-content">
            <div id="image-paste-title">Do you want to send the image?</div>
            <div class="image-paste-info" id="image-paste-info"></div>
            <img class="image-paste-preview" id="image-paste-preview" src="">
            <video class="image-paste-preview" id="video-paste-preview" controls autoplay muted style="display:none;"></video>
        </div>
        <div class="dialog-footer">
            <button id="image-paste-yes">Yes</button>
            <button id="image-paste-no">No</button>
        </div>
    </dialog>

        <dialog class="dialog-box" id="sticker-dialog" style="width: 800px;">
            <div class="dialog-content">
                <div id="sticker-list" class="sticker-list"></div>
            </div>
            <div class="dialog-footer">
                <button id="sticker-close">Close</button>
            </div>
        </dialog>
</body>

</html>
