<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Chat room</title>
</head>

<body>
    <div class="container">
        <div class="content-box">
            <div class="content-title">
                <button class="nav-button" id="sidebar-button">
                    <svg viewBox="0 0 24 24">
                        <polygon fill="currentcolor" points="22 11 23 11 23 13 22 13 22 14 2 14 2 13 1 13 1 11 2 11 2 10 22 10 22 11" />
                        <polygon fill="currentcolor" points="22 19 23 19 23 21 22 21 22 22 2 22 2 21 1 21 1 19 2 19 2 18 22 18 22 19" />
                        <polygon fill="currentcolor" points="23 3 23 5 22 5 22 6 2 6 2 5 1 5 1 3 2 3 2 2 22 2 22 3 23 3" />
                    </svg>
                </button>
                <div class="site-title text-ellipsis">Chat room</div>
                <button id="user-button">
                    <div id="user-name"></div>
                    <div id="user-addr"></div>
                </button>
            </div>
            <div class="content-main">
                <div id="sidebar" class="content-left">
                    <div class="channel-box">
                        <input class="input-unstyled" id="channel-input">
                    </div>
                    <div class="user-list" id="user-list">
                        <!--
                        <div class="user-item">Name</div>
                        -->
                    </div>
                </div>
                <div id="content" class="content-right">
                    <div class="chat-log" id="chat-list">
                        <!--
                        <div class="chat-system">System message</div>
                        <div class="chat-message">
                            <div class="chat-message-time">127.0.0.1 - 1/1 8:00</div>
                            <div class="chat-message-name">Name</div>
                            <div class="chat-message-message">Message</div>
                        </div>
                        -->
                    </div>
                    <div class="chat-box">
                        <input autocomplete="off" enterkeyhint="send" id="chat-input" class="input-unstyled chat-input">
                        <button class="chat-button" id="emoji-button">
                            <svg viewBox="0 0 24 24">
                                <polygon fill="currentcolor" points="11 20 10 20 10 22 9 22 9 23 5 23 5 22 4 22 4 16 5 16 5 15 6 15 6 18 8 18 8 17 10 17 10 16 12 16 12 15 14 15 14 17 13 17 13 18 11 18 11 20" />
                                <path fill="currentcolor" d="m22,9v-2h-1v-2h-1v-1h-1v-1h-2v-1h-2v-1h-6v1h-2v1h-2v1h-1v1h-1v2h-1v2h-1v6h1v1h1v-1h1v-1h3v2h2v-1h2v-1h-1v-1h-2v-1h3v1h2v1h2v4h-1v1h-2v2h-1v2h4v-1h2v-1h2v-1h1v-1h1v-2h1v-2h1v-6h-1Zm-7-2h3v1h1v2h-1v-1h-1v-1h-2v-1Zm-1,2h2v2h-2v-2Zm-4,1h-2v-2h2v2Zm1-2v-1h-1v-1h-2v1h-2v-1h1v-1h4v1h1v1h1v1h-2Z" />
                            </svg>
                        </button>
                        <button class="chat-button" id="image-button">
                            <input type="file" accept="image/*" id="image-input">
                            <svg viewBox="0 0 24 24">
                                <polygon fill="currentcolor" points="23 20 23 22 22 22 22 23 2 23 2 22 1 22 1 15 2 15 2 16 3 16 3 17 4 17 4 18 5 18 5 19 6 19 6 20 7 20 7 21 8 21 8 20 9 20 9 19 10 19 10 18 11 18 11 17 12 17 12 16 13 16 13 15 14 15 14 14 15 14 15 13 16 13 16 14 17 14 17 15 18 15 18 16 19 16 19 17 20 17 20 18 21 18 21 19 22 19 22 20 23 20" />
                                <path fill="currentcolor" d="m22,2v-1H2v1h-1v10h1v1h1v1h1v1h1v1h1v1h1v1h1v-1h1v-1h1v-1h1v-1h1v-1h1v-1h1v-1h1v-1h1v1h1v1h1v1h1v1h1v1h1v1h1v1h1V2h-1Zm-13,4v3h-1v1h-3v-1h-1v-3h1v-1h3v1h1Z" />
                            </svg>
                        </button>
                        <button class="chat-button" id="send-button">
                            <svg viewBox="0 0 24 24">
                                <path fill="currentcolor" d="m1 1.5 4 0V2.5H7v1h2v1h2v1h2v1h2V7.5H17v1h2v1h2V10.5l2 0v2l-2 0v1h-2v1H17v1h-2v1h-2v1h-2v1H9v1H7v1H5v1H1v-2h1v-2h1v-2h1v-2h1v-1h7v-2H5V9.5H4V7.5H3V5.5h-1V3.5H1Z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <dialog class="dialog-box" id="connect-dialog">
        <div class="dialog-content center">Connecting...</div>
    </dialog>

    <dialog class="dialog-box" id="name-dialog">
        <div class="dialog-content">
            <label for="name-input">Nickname</label>
            <input class="input-unstyled input-bordered" id="name-input">
        </div>
        <div class="dialog-content">
            <label for="token-input">Token</label>
            <input class="input-unstyled input-bordered" spellcheck="false" id="token-input">
        </div>
        <div class="dialog-footer">
            <button id="name-cancel">Cancel</button>
            <button id="name-ok">OK</button>
        </div>
    </dialog>

    <dialog class="dialog-box" id="user-info-dialog">
        <div class="dialog-content">
            <div id="user-info-name">Example user</div>
            <div id="user-info-addr">127.0.*.*</div>
        </div>
        <div class="dialog-footer">
            <button id="user-info-ok">OK</button>
        </div>
    </dialog>
</body>

</html>
